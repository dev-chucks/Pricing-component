<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order preview project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="images/illustration-hero.svg" alt="a woman dancing to music" class="illustration-hero">
        <h1 id="order">Order Surmmary</h1>
        <p id="para">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
   
    <div class="block">
        <img src="images/icon-music.svg" alt="music icon" class="music-icon">
    
    <div class="plan">
        <strong id="annual">Annual Plan</strong>
        <p id="price">$59.99/year</p>
    </div>
        <p id="link"><a href="link">Change</a></p>
    </div>
        <button id="payment-el" class="btn" onclick="payment()">Proceed to Payment</button>
        <h6 id="cancel">Cancel Order</h6>
    </div>
    <script src="script.js"></script>
</body>
</html>
